<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APEX Admin Dashboard</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg: #080808;
            --surface: #111111;
            --card: #181818;
            --border: #252525;
            --accent: #c8ff00;
            --accent2: #ff4545;
            --text: #f0f0f0;
            --muted: #888888;
            --font-d: 'Bebas Neue', sans-serif;
            --font-b: 'DM Sans', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-b);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: var(--surface);
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .brand {
            font-family: var(--font-d);
            font-size: 2rem;
            letter-spacing: 2px;
            color: var(--text);
        }

        .brand span {
            color: var(--accent);
        }

        .btn {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 16px;
            font-family: var(--font-b);
            cursor: pointer;
            border-radius: 4px;
            transition: 0.2s;
        }

        .btn:hover {
            background: var(--border);
            border-color: var(--accent);
        }

        .btn.primary {
            background: var(--accent);
            color: #000;
            border: none;
            font-weight: bold;
        }

        .btn.primary:hover {
            background: #b0e000;
        }

        .btn.danger {
            background: rgba(255, 69, 69, 0.1);
            color: var(--accent2);
            border-color: rgba(255, 69, 69, 0.2);
        }

        .btn.danger:hover {
            background: var(--accent2);
            color: #fff;
        }

        /* Login Overlay */
        #admin-login {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: var(--surface);
            padding: 40px;
            border-radius: 8px;
            border: 1px solid var(--border);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-box h2 {
            font-family: var(--font-d);
            font-size: 2.5rem;
            margin-bottom: 20px;
        }

        .input-grp {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-grp label {
            display: block;
            font-size: 0.8rem;
            color: var(--muted);
            margin-bottom: 5px;
        }

        .input-grp input {
            width: 100%;
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--font-b);
            border-radius: 4px;
            outline: none;
        }

        .input-grp input:focus {
            border-color: var(--accent);
        }

        /* Dashboard Layout */
        .dashboard {
            flex: 1;
            padding: 30px;
            display: none;
            /* hidden until login */
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 24px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-val {
            font-family: var(--font-d);
            font-size: 3rem;
            color: var(--accent);
            margin-bottom: 5px;
        }

        .stat-lbl {
            font-size: 0.9rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Data Table */
        .table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th,
        td {
            padding: 16px;
            border-bottom: 1px solid var(--border);
        }

        th {
            font-size: 0.85rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            background: rgba(255, 255, 255, 0.02);
        }

        td {
            font-size: 0.95rem;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .tag {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: bold;
            background: var(--border);
        }

        .tag.premium {
            background: rgba(200, 255, 0, 0.1);
            color: var(--accent);
        }
    </style>
</head>

<body>

    <!-- Login Modal -->
    <div id="admin-login">
        <div class="login-box">
            <h2>APEX <span>ADMIN</span></h2>
            <div id="login-err" style="color:var(--accent2); font-size:0.9rem; margin-bottom:15px; display:none;">
                Invalid credentials</div>
            <div class="input-grp">
                <label>Admin Email</label>
                <input type="email" id="adm-email" value="admin@apex.com" placeholder="admin@apex.com">
            </div>
            <div class="input-grp">
                <label>Password</label>
                <input type="password" id="adm-pass" placeholder="Enter password (admin123)">
            </div>
            <button class="btn primary" style="width:100%; margin-top:10px; padding:12px;"
                onclick="doAdminLogin()">ACCESS SYSTEM</button>
        </div>
    </div>

    <!-- Dashboard -->
    <header style="display:none;" id="adm-header">
        <div class="brand">APEX <span>ADMIN</span></div>
        <button class="btn" onclick="logoutAdmin()">Logout</button>
    </header>

    <div class="dashboard" id="adm-dash">

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-val" id="st-users">0</div>
                <div class="stat-lbl">Registered Users</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="st-workouts">0</div>
                <div class="stat-lbl">Workouts Logged</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="st-meals">0</div>
                <div class="stat-lbl">Meals Logged</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="st-habits">0</div>
                <div class="stat-lbl">Active Habits</div>
            </div>
        </div>

        <h3
            style="font-family:var(--font-d); font-size:1.8rem; margin-bottom:15px; border-bottom:1px solid var(--border); padding-bottom:10px;">
            User Database</h3>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Goal</th>
                        <th>Plan</th>
                        <th>Joined</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody id="user-table-body">
                    <!-- Rows injected via JS -->
                </tbody>
            </table>
        </div>

    </div>

    <script>
        let token = localStorage.getItem('apex_admin_token');

        if (token) {
            showDashboard();
        }

        async function doAdminLogin() {
            const email = document.getElementById('adm-email').value;
            const password = document.getElementById('adm-pass').value;
            const errEl = document.getElementById('login-err');

            if (!email || !password) return;

            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                if (!res.ok) throw new Error('Invalid login');

                const data = await res.json();
                localStorage.setItem('apex_admin_token', data.token);
                errEl.style.display = 'none';
                showDashboard();
            } catch (e) {
                errEl.style.display = 'block';
            }
        }

        function logoutAdmin() {
            localStorage.removeItem('apex_admin_token');
            document.getElementById('admin-login').style.display = 'flex';
            document.getElementById('adm-header').style.display = 'none';
            document.getElementById('adm-dash').style.display = 'none';
        }

        function showDashboard() {
            document.getElementById('admin-login').style.display = 'none';
            document.getElementById('adm-header').style.display = 'flex';
            document.getElementById('adm-dash').style.display = 'block';
            loadStats();
            loadUsers();
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/admin/stats');
                const data = await res.json();

                document.getElementById('st-users').textContent = data.totalUsers;
                document.getElementById('st-workouts').textContent = data.totalWorkouts;
                document.getElementById('st-meals').textContent = data.totalMeals;
                document.getElementById('st-habits').textContent = data.activeHabits;
            } catch (e) {
                console.error("Error loading stats", e);
            }
        }

        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users');
                const data = await res.json();

                const tbody = document.getElementById('user-table-body');
                tbody.innerHTML = '';

                if (data.users.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--muted);">No users found.</td></tr>';
                    return;
                }

                data.users.forEach(u => {
                    const dateStr = u.createdAt ? new Date(u.createdAt).toLocaleDateString() : 'N/A';
                    const planTag = u.plan === 'pro' ? '<span class="tag premium">PRO</span>' : '<span class="tag">FREE</span>';

                    tbody.innerHTML += `
            <tr>
              <td><strong style="color:var(--text);">${u.fname} ${u.lname}</strong></td>
              <td style="color:var(--muted);">${u.email}</td>
              <td style="text-transform:capitalize;">${u.goal || 'N/A'}</td>
              <td>${planTag}</td>
              <td style="font-family:var(--font-m); font-size:0.8rem;">${dateStr}</td>
              <td>
                <button class="btn danger" onclick="deleteUser('${u.email}')">Terminate</button>
              </td>
            </tr>
          `;
                });
            } catch (e) {
                console.error("Error loading users", e);
            }
        }

        async function deleteUser(email) {
            if (email === 'admin@apex.com') {
                alert("Cannot delete admin.");
                return;
            }

            if (!confirm(`Are you absolutely sure you want to delete ${email} and all their data? This cannot be undone.`)) {
                return;
            }

            try {
                const res = await fetch('/api/admin/user/' + encodeURIComponent(email), {
                    method: 'DELETE'
                });

                if (res.ok) {
                    loadUsers();
                    loadStats();
                } else {
                    const data = await res.json();
                    alert(data.error || "Failed to delete user.");
                }
            } catch (e) {
                alert("Error communicating with server.");
            }
        }
    </script>
</body>

</html>
